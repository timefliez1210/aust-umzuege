<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Seite nicht gefunden | Aust Umz&uuml;ge</title>
    <meta name="robots" content="noindex, follow" />
    <link rel="icon" type="image/x-icon" href="/favicon_io/favicon.ico" />
    <meta name="theme-color" content="#1e3a5f" />
    <style>
        @font-face{font-family:'Inter';font-style:normal;font-weight:400;font-display:optional;src:url('/fonts/inter-400.woff2') format('woff2')}
        @font-face{font-family:'Inter';font-style:normal;font-weight:700;font-display:optional;src:url('/fonts/inter-700.woff2') format('woff2')}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#fff;color:#333;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:2rem}
        h1{font-size:5rem;font-weight:700;color:#1e3a5f;margin:0 0 0.5rem;line-height:1}
        .message{font-size:1.25rem;color:#333;margin:0 0 0.5rem}
        .hint{font-size:1rem;color:#666;margin-bottom:2rem}
        .cta{display:inline-flex;align-items:center;gap:0.5rem;padding:0.75rem 1.5rem;background:linear-gradient(135deg,#ff6b00 0%,#e65100 100%);color:#fafafa;font-weight:700;font-size:0.875rem;text-decoration:none;border-radius:0.5rem;transition:transform 0.2s,box-shadow 0.2s}
        .cta:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(230,81,0,0.3)}
    </style>
</head>
<body>
    <h1>404</h1>
    <p class="message">Wir haben hier leider keine Seite gefunden</p>
    <p class="hint">Die Seite existiert nicht mehr oder die Adresse wurde falsch eingegeben.</p>
    <a href="/" class="cta">Zur Startseite</a>
</body>
</html>
